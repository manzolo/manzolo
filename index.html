      ["GitSimulator","Apri il cofano di Git: object store content-addressed, SHA-1 reale, 14 livelli + sandbox (IT/EN)","Open the hood on Git: content-addressed object store, real SHA-1, 14 levels + sandbox (IT/EN)",{demo:"GitSimulator",edu:true}],
      ["GitBranchingSimulator","Impara i branch di git sul DAG animato: merge, rebase, cherry-pick, 14 livelli + sandbox (IT/EN)","Learn git branching on an animated commit DAG: merge, rebase, cherry-pick, 14 levels + sandbox (IT/EN)",{demo:"GitBranchingSimulator",edu:true}],
      ["CryptoSimulator","Impara la crittografia guardandola girare: cifrari classici, chiave pubblica/RSA e hashing, motori scritti a mano + sandbox (IT/EN)","Learn cryptography by watching it run: classic ciphers, public-key/RSA and hashing, hand-written engines + sandbox (IT/EN)",{demo:"CryptoSimulator",edu:true}],
      ["NeuralSimulator","Impara le reti neurali e il pre-training degli LLM: backprop animata, attention heatmap, un Transformer giocattolo, 14 livelli + sandbox (IT/EN)","Learn neural networks and LLM pre-training: animated backprop, attention heatmaps, a toy Transformer, 14 levels + sandbox (IT/EN)",{demo:"NeuralSimulator",edu:true}],
    ]},
  ]},
];

let lang = localStorage.getItem("lang") || "it";
let searchMode = false;

const ICON_GH = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38v-1.33c-2.23.48-2.7-1.07-2.7-1.07-.36-.93-.89-1.18-.89-1.18-.73-.5.05-.49.05-.49.8.06 1.23.83 1.23.83.72 1.22 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.2c0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>';
const ICON_EXT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>';

function flatItems(sec) {
  return sec.subs ? sec.subs.flatMap(s => s.items) : sec.items;
}

function route() {
  const h = location.hash.replace(/^#\/?/, "");
  return DATA.some(s => s.id === h) ? h : "";
}

function card(item) {
  const [repo, it, en, meta = {}] = item;
  const desc = lang === "it" ? it : en;
  const chips = [];
  if (meta.star) chips.push(`<span class="chip star">⭐ ${meta.star}</span>`);
  if (meta.edu) chips.push(`<span class="chip edu">EDU</span>`);
  const demoLabel = lang === "it" ? "Apri" : "Open";
  const demoLnk = meta.demo
    ? `<a class="lnk demo" href="${P}${meta.demo}/" target="_blank" rel="noopener">${ICON_EXT} ${demoLabel}</a>`
    : "";
  const haystack = (repo + " " + it + " " + en).toLowerCase();
  return `<article class="card" data-search="${haystack.replace(/"/g,'')}">
    <div class="card-top">
      <a class="card-name" href="${R}${repo}" target="_blank" rel="noopener">${repo}</a>
      ${chips.join("")}
    </div>
    <p class="card-desc">${desc}</p>
    <div class="card-links">
      <a class="lnk repo" href="${R}${repo}" target="_blank" rel="noopener">${ICON_GH} repo</a>
      ${demoLnk}
    </div>
  </article>`;
}

function sectionHtml(sec) {
  const title = lang === "it" ? sec.it : sec.en;
  let body = "";
  const note = lang === "it" ? sec.note_it : sec.note_en;
  if (note) body += `<p class="card-desc" style="margin-bottom:.8rem">${note}</p>`;
  if (sec.subs) {
    for (const sub of sec.subs) {
      const subTitle = lang === "it" ? sub.it : sub.en;
      body += `<h3 class="subhead">${subTitle}</h3><div class="grid">`;
      body += sub.items.map(card).join("");
      body += `</div>`;
    }
  } else {
    body += `<div class="grid">${sec.items.map(card).join("")}</div>`;
  }
  return `<section id="${sec.id}">
    <div class="sec-head"><h2>${title}</h2><span class="count">${flatItems(sec).length}</span></div>
    ${body}
  </section>`;
}

function featured(sec) {
  const items = flatItems(sec);
  const score = i => ((i[3] && i[3].star) || 0) * 1000 + (i[3] && i[3].demo ? 1 : 0);
  return [...items].sort((a, b) => score(b) - score(a)).slice(0, 3);
}

function macroCard(sec) {
  const title = lang === "it" ? sec.it : sec.en;
  const [emoji, ...rest] = title.split(" ");
  const desc = lang === "it" ? sec.desc_it : sec.desc_en;
  const feats = featured(sec).map(i => {
    const star = i[3] && i[3].star ? "⭐ " : "";
    return `<span>${star}${i[0]}</span>`;
  }).join("");
  const cta = lang === "it" ? "esplora →" : "explore →";
  return `<a class="macro-card" href="#/${sec.id}">
    <span class="macro-emoji">${emoji}</span>
    <span class="macro-title">${rest.join(" ")} <span class="macro-count">${flatItems(sec).length}</span></span>
    <span class="macro-desc">${desc}</span>
    <span class="macro-featured">${feats}</span>
    <span class="macro-cta">${cta}</span>
  </a>`;
}

function render() {
  const main = document.getElementById("main");
  const crumb = document.getElementById("crumb");
  const cats = document.getElementById("cats");
  const r = route();

  cats.innerHTML = DATA.map(sec => {
    const title = lang === "it" ? sec.it : sec.en;
    const active = !searchMode && r === sec.id ? " class=\"active\"" : "";
    return `<a href="#/${sec.id}"${active}>${title}</a>`;
  }).join("");

  const promptCmd = document.getElementById("promptCmd");

  if (searchMode) {
    promptCmd.textContent = "grep -ri … ~/projects";
    crumb.innerHTML = "";
    main.innerHTML = DATA.map(sectionHtml).join("");
  } else if (r) {
    const sec = DATA.find(s => s.id === r);
    promptCmd.textContent = `ls ~/projects/${r}`;
    const home = lang === "it" ? "🏠 home" : "🏠 home";
    const title = lang === "it" ? sec.it : sec.en;
    crumb.innerHTML = `<a href="#/">${home}</a><span class="sep">/</span><span class="here">${title}</span>`;
    main.innerHTML = sectionHtml(sec);
  } else {
    promptCmd.textContent = "ls ~/projects";
    crumb.innerHTML = "";
    main.innerHTML = `<div class="macro-grid">${DATA.map(macroCard).join("")}</div>`;
  }

  applyStaticLang();
  filter();
}

function applyStaticLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-it]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });
  const s = document.getElementById("search");
  s.placeholder = s.getAttribute("data-" + lang + "-ph");
  document.getElementById("langIt").classList.toggle("on", lang === "it");
  document.getElementById("langEn").classList.toggle("on", lang === "en");
}

function filter() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll("section").forEach(sec => {
    let secVisible = false;
    sec.querySelectorAll(".card").forEach(c => {
      const match = !q || c.dataset.search.includes(q);
      c.style.display = match ? "" : "none";
      if (match) secVisible = true;
    });
    // hide empty subheads
    sec.querySelectorAll(".grid").forEach(g => {
      const vis = [...g.querySelectorAll(".card")].some(c => c.style.display !== "none");
      g.style.display = vis ? "" : "none";
      const prev = g.previousElementSibling;
      if (prev && prev.classList.contains("subhead")) prev.style.display = vis ? "" : "none";
    });
    sec.style.display = secVisible ? "" : "none";
    if (secVisible) anyVisible = true;
  });
  const hasCards = document.querySelectorAll("section .card").length > 0;
  document.getElementById("noResults").classList.toggle("show", hasCards && !anyVisible);
}

// theme
function currentTheme() {
  return localStorage.getItem("theme")
    || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
}
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeIcon").textContent = t === "dark" ? "☀" : "☾";
  localStorage.setItem("theme", t);
}

document.getElementById("langBtn").addEventListener("click", () => {
  lang = lang === "it" ? "en" : "it";
  localStorage.setItem("lang", lang);
  render();
});
document.getElementById("themeBtn").addEventListener("click", () => {
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
});

document.getElementById("search").addEventListener("input", () => {
  const q = document.getElementById("search").value.trim();
  const wasSearch = searchMode;
  searchMode = q.length > 0;
  if (searchMode !== wasSearch) render();
  else filter();
});

window.addEventListener("hashchange", () => {
  const s = document.getElementById("search");
  if (s.value) { s.value = ""; searchMode = false; }
  render();
  window.scrollTo({ top: 0 });
});

applyTheme(currentTheme());
render();
</script>
</body>
</html>
